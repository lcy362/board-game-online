name = "speed101-games"
pages_build_output_dir = "dist"

# Cloudflare Pages 零配置部署说明（连接 Git 仓库后无需手动设置）：
# - 本文件声明 pages_build_output_dir = "dist"，Cloudflare 会自动把「输出目录」设为 dist。
# - dist/ 已随仓库提交（由 scripts/build.mjs 生成，仅含公开页：
#   index.html / assets / games / robots.txt / sitemap.xml），
#   因此即使「构建命令」留空，Cloudflare 也能直接发布已提交的 dist/，实现一键部署。
# - 本地更新站点后：运行 npm run build 重新生成 dist/，再 git push 即可。
# - 自定义域名 game.lichuanyang.top 在 Pages → Custom domains 绑定
#   （任何主机都必填的域名解析，不属于「构建配置」）。
