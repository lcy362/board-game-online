name = "speed101-games"
pages_build_output_dir = "dist"

# 部署方式（二选一）：
# ① Cloudflare Pages 控制台「连接 Git 仓库」：无需任何构建配置。
#    仓库根目录即为站点，.cfignore 已排除开发/规划目录，
#    连接后直接 Deploy 即可（自定义域名 game.lichuanyang.top 在 Pages → Custom domains 绑定）。
# ② 本地 CLI：npm install && npm run deploy（需先 npx wrangler login）
#    该方式走 dist/ 构建产物（scripts/build.mjs 生成，仅含公开页）。
